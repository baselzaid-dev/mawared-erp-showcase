<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="540" viewBox="0 0 1800 540" role="img" aria-labelledby="title desc">
  <title id="title">Mawared ERP showcase banner</title>
  <desc id="desc">Mawared ERP, an Arabic-first HR and enterprise operations platform</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041426"/>
      <stop offset="0.50" stop-color="#06243a"/>
      <stop offset="1" stop-color="#0c7f8d"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2d67"/>
      <stop offset="1" stop-color="#073c50"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b9fff4"/>
      <stop offset="0.52" stop-color="#53e7d5"/>
      <stop offset="1" stop-color="#18b9c3"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#53e7d5" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#53e7d5" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <clipPath id="round"><rect width="1800" height="540" rx="34"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="1800" height="540" fill="url(#bg)"/>
    <circle cx="1610" cy="-40" r="240" fill="#0f9faf" opacity="0.12"/>
    <circle cx="1750" cy="650" r="410" fill="#2de1e1" opacity="0.12"/>
    <circle cx="-95" cy="620" r="290" fill="#0aa9b5" opacity="0.10"/>
    <circle cx="1560" cy="18" r="205" fill="none" stroke="#2ad8de" stroke-opacity="0.25" stroke-width="4"/>
    <circle cx="-40" cy="560" r="230" fill="none" stroke="#0e7fa3" stroke-opacity="0.24" stroke-width="4"/>
    <ellipse cx="1510" cy="420" rx="360" ry="150" fill="#00d2de" opacity="0.08" filter="url(#soft)"/>
    <g opacity="0.42" fill="#0f80a1">
      <circle cx="63" cy="54" r="4"/><circle cx="97" cy="54" r="4"/><circle cx="131" cy="54" r="4"/><circle cx="165" cy="54" r="4"/>
      <circle cx="63" cy="88" r="4"/><circle cx="97" cy="88" r="4"/><circle cx="131" cy="88" r="4"/><circle cx="165" cy="88" r="4"/>
      <circle cx="63" cy="122" r="4"/><circle cx="97" cy="122" r="4"/><circle cx="131" cy="122" r="4"/><circle cx="165" cy="122" r="4"/>
      <circle cx="63" cy="156" r="4"/><circle cx="97" cy="156" r="4"/><circle cx="131" cy="156" r="4"/><circle cx="165" cy="156" r="4"/>
    </g>
    <g transform="translate(145 135)">
      <rect width="260" height="260" rx="58" fill="url(#iconbg)" stroke="#2cb3ca" stroke-opacity="0.6" stroke-width="3"/>
      <path d="M49 192V66h50l31 49 31-49h50v126h-46v-66l-35 53-35-53v66z" fill="url(#mint)"/>
      <path d="M95 171h70v44H95z" fill="url(#fade)" opacity="0.45"/>
    </g>
    <text x="470" y="215" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="88" font-weight="700">Mawared ERP</text>
    <text x="470" y="288" fill="#5ce9d7" font-family="Noto Sans Arabic,Tahoma,Arial,sans-serif" font-size="56" font-weight="700">موارد</text>
    <text x="470" y="360" fill="#f6fbfc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="400">Arabic-first HR &amp; enterprise operations platform</text>
    <text x="470" y="421" fill="#55e2d6" font-family="Noto Sans Arabic,Tahoma,Arial,sans-serif" font-size="34" font-weight="500">منصة عربية لإدارة الموارد البشرية وعمليات الشركات</text>
    <g transform="translate(1485 375)">
      <rect width="210" height="64" rx="32" fill="#0a6170" fill-opacity="0.40" stroke="#27d4d4" stroke-opacity="0.62" stroke-width="2"/>
      <text x="105" y="41" text-anchor="middle" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" letter-spacing="2">SHOWCASE</text>
